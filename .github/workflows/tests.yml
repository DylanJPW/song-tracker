name: Run Tests

on:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: song-tracker-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw --batch-mode -DskipTests package

      - name: Test
        run: ./mvnw --batch-mode test

      - name: Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

  frontend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: song-tracker-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: song-tracker-frontend/package-lock.json

      - run: npm ci
      - run: npm test -- --run
