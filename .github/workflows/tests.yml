name: Run Tests

on:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: song-tracker-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Test
        run: ./mvnw --batch-mode clean test

      - name: Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: song-tracker-backend/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

  frontend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: song-tracker-frontend

    steps:
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --dir song-tracker-frontend

      - name: Test
        run: pnpm test:ci --dir song-tracker-frontend
